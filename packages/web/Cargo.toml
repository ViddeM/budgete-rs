[package]
name = "web"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true, features = ["router", "fullstack"] }
ui = { workspace = true }
api = { workspace = true }
serde = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
rust_decimal = { workspace = true }
base64 = "0.22"

axum = { version = "0.8", optional = true }

[build-dependencies]
grass = "0.13"

[features]
default = []
web = ["dioxus/web"]
server = ["dioxus/server", "ui/server", "api/server", "dep:axum"]
