[package]
name = "api"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true, features = ["fullstack"] }
serde = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
rust_decimal = { workspace = true }

# Optional server-only deps, enabled by the `server` feature
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "chrono", "uuid", "rust_decimal"], optional = true }
tokio = { version = "1", features = ["full"], optional = true }
sha2 = { version = "0.10", optional = true }
dotenvy = { version = "0.15", optional = true }

[features]
server = ["dioxus/server", "dep:sqlx", "dep:tokio", "dep:sha2", "dep:dotenvy"]
